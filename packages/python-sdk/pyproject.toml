[tool.poetry]
name = "vaultkey"
version = "1.0.1"
description = "Python SDK for the VaultKey API"
authors = ["VaultKey"]
license = "MIT"
readme = "README.md"
packages = [{ include = "vaultkey" }]
include = ["vaultkey/py.typed"]

[tool.poetry.dependencies]
python = ">=3.8,<4.0"
requests = "^2.32.0"
typing_extensions = ">=4.7"

[tool.poetry.group.dev.dependencies]
pytest = "^8.3.5"

[build-system]
requires = ["poetry-core"]
build-backend = "poetry.core.masonry.api"